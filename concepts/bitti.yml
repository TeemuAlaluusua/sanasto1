definitions:
- lang: fi
  text: Bitti on informaatioteoriassa informaation määrän mitta ja tietotekniikassa tiedon tai tietovuon pienin käsiteltävä osa. Sähköisen tiedon pienin yksikkö on bitti (b), yksi merkki, joka voi saada arvon 1 tai 0.

- lang: sv
  text: En bit är inom informationsteori ett mått på informationsmängd och inom datateknik den minsta enheten av data eller dataflöde som kan behandlas. Den minsta enheten för elektronisk information är bit (b), en symbol som kan anta värdet 1 eller 0.

- lang: en
  text: A bit is, in information theory, a unit of information and, in computing, the smallest unit of data or data stream that can be processed. The smallest unit of electronic information is the bit (b), a symbol that can take the value 1 or 0.

