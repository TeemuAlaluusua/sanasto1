definitions:
- lang: fi
  text: prosessi, jossa kohteesta muodostetaan malli

- lang: sv
  text: process där en modell skapas av ett objekt eller fenomen

- lang: en
  text: process of creating a model of an object or phenomenon

notes:
- lang: fi
  text: |
    Mallinnusta käytetään esimerkiksi järjestelmien,
    prosessien, rakenteiden tai tietojen kuvaamiseen.

- lang: sv
  text: |
    Modellering används till exempel för att beskriva
    system, processer, strukturer eller data.

- lang: en
  text: |
    Modelling is used to describe systems, processes,
    structures or data.

