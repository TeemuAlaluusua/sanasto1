definitions:
- lang: fi
  text: Datalla tarkoitetaan informaation uudelleen tulkittavissa olevaa esitystapaa virallistetulla tavalla, joka soveltuu viestintään, tulkintaan tai käsittelyyn.

- lang: sv
  text: Data avser en formaliserad representation av information som kan tolkas på nytt och som lämpar sig för kommunikation, tolkning eller behandling.

- lang: en
  text: Data refers to a formalized representation of information that can be reinterpreted and is suitable for communication, interpretation or processing.

