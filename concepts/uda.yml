- lang: fi
  text: käyttäjän määrittelemällä attribuutilla tarkoitetaan suunnitteluohjelmistoissa mallin objekteille talletettavaa liitännäistietoa (metatieto).

- lang: sv
  text: Med UDA avses tilläggsinformation (metadata) som lagras för modellobjekt i designprogramvara.

- lang: en
  text: A user defined attribute (UDA) refers to additional information (metadata) stored for model objects in design software.

