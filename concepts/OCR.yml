definitions:
- lang: fi
  text: |
    Menetelmä, jossa koneellisesti kirjoitettua, tulostettua tai
    käsin kirjoitettua tekstiä sisältävät kuvat muunnetaan
    koneellisesti käsiteltäväksi tekstimuodoksi.

- lang: sv
  text: |
    Metod där bilder som innehåller maskinskriven, tryckt eller
    handskriven text omvandlas till maskinläsbar text.

- lang: en
  text: |
    Conversion of images of typed, printed or handwritten text
    into machine-readable text.

notes:
- lang: fi
  text: |
    OCR-teknologiaa käytetään esimerkiksi skannattujen asiakirjojen
    digitoinnissa, arkistoinnissa ja tekstin automaattisessa
    käsittelyssä.

- lang: sv
  text: |
    OCR-teknik används till exempel för digitalisering av skannade
    dokument, arkivering och automatisk behandling av text.

- lang: en
  text: |
    OCR technology is commonly used for digitizing scanned
    documents and enabling automated processing of textual
    information.

