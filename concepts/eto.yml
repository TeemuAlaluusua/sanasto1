definitions:
- lang: fi
  text: tuotantomenetelmä, jossa tuote suunnitellaan ja valmistetaan asiakaskohtaisen tilauksen perusteella

- lang: sv
  text: produktionsmetod där produkten konstrueras och tillverkas utifrån en kundspecifik beställning

- lang: en
  text: production strategy in which a product is designed and manufactured based on a specific customer order

notes:
- lang: fi
  text: |
    ETO-mallissa asiakastilauksen kytkentäpiste sijaitsee
    tuotesuunnitteluvaiheessa. Tuotteet ovat yleensä
    asiakaskohtaisesti kustomoituja, mikä johtaa
    pidempiin toimitusaikoihin ja korkeampiin
    tuotantokustannuksiin.

- lang: sv
  text: |
    I ETO-modellen ligger kundorderpunkten i
    konstruktionsfasen. Produkterna är vanligtvis
    kundanpassade, vilket ofta innebär längre
    leveranstider och högre produktionskostnader.

- lang: en
  text: |
    In the ETO model the customer order decoupling
    point occurs in the design phase. Products are
    typically customised, which often results in
    longer lead times and higher production costs.

