definitions:
  - lang: fi
    text: Tuotantomuoto, jossa tuotteet valmistetaan asiakaskohtaisten tilausten perusteella ennalta määriteltyjen tuotesuunnitelmien mukaisesti.
  - lang: sv
    text: Produktionsform där produkter tillverkas utifrån kundspecifika beställningar enligt fördefinierade produktplaner.
  - lang: en
    text: Production strategy in which products are manufactured based on customer-specific orders according to predefined product designs.
notes:
  - lang: fi
    text: |
      MTO-tuotteet ovat usein pitkälti kustomoituja ja niiden tuotantoajat ovat MTS-tuotteita pidempiä, koska tuotanto aloitetaan tilauksesta.
      Tuotantomuotoa käytetään, kun tuotevalikoima on laaja ja yksittäisten tuotteiden kysyntä on vähäistä.
      Vähäisen kysynnän vuoksi tuotteet ovat tyypillisesti kalliimpia kuin MTS-tuotannossa, mutta tarjoavat enemmän joustavuutta ja kustomointimahdollisuuksia.
      Rakentamisessa MTO-tuotteet voivat olla lähellä standardoituja tuotteita, mutta sisältää asiakaskohtaisia muokkauksia, kuten värivaihtoehtoja, jotka toteutetaan vasta tilauksen jälkeen.
  - lang: sv
    text: |
      MTO-produkter är ofta i hög grad kundanpassade och har längre ledtider än MTS-produkter eftersom produktionen startar först efter beställning.
      Produktionsformen används när produktutbudet är brett och efterfrågan per produkt är låg.
      Produkterna är typiskt dyrare än i MTS-produktion men möjliggör större flexibilitet och kundanpassning.
      Inom byggsektorn kan MTO-produkter likna standardprodukter men inkludera kundspecifika variationer, såsom färgval som produceras efter beställning.
  - lang: en
    text: |
      MTO products are often highly customized and have longer lead times than MTS products because production starts upon order.
      The strategy is used when the product range is wide and demand per item is low.
      Products are typically more expensive than in MTS production but offer greater flexibility and customization possibilities.
      In construction, MTO products may resemble standard products but include customer-specific modifications such as color variants produced after ordering.
