definitions:
- lang: fi
  text: Tavu on tietotekniikassa käytettävä mittayksikkö sellaiselle tallennuskapasiteetille, joka on riippumaton tallennetun datan tyypistä. Bitin jälkeen seuraavaksi pienin yksikkö on tavu (t), joka on kahdeksan bittiä, eli esimerkiksi merkkijono 00010101.

- lang: sv
  text: En byte är en måttenhet inom datateknik för lagringskapacitet som är oberoende av typen av lagrad data. Näst efter biten är byten den minsta enheten och motsvarar åtta bitar, till exempel bitsekvensen 00010101.

- lang: en
  text: A byte is a unit of storage capacity in computing that is independent of the type of stored data. The byte is the next smallest unit after the bit and consists of eight bits, for example the bit sequence 00010101.

