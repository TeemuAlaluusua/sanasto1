definitions:
- lang: fi
  text: |
    Luettelo kaikista osakokoonpanoista, osista ja/tai
    materiaaleista, joita käytetään tuotteen valmistuksessa,
    mukaan lukien kunkin materiaalin määrä tuotteen
    valmistamiseksi.

- lang: sv
  text: |
    Lista över alla delmonteringar, delar och/eller material
    som används vid produktion av en produkt, inklusive den
    mängd av varje material som behövs för att tillverka
    produkten.

- lang: en
  text: |
    Listing of all the subassemblies, parts, and/or materials
    that are used in the production of a product, including
    the quantity of each material required to make a product.

