definitions:
- lang: fi
  text: rakennuskohteen informaatiomalli, joka sisältää rakennuskohteen käyttö- ja ylläpitovaiheen aikana tarvittavat tiedot

- lang: sv
  text: informationsmodell för byggnadsobjekt som innehåller de uppgifter som behövs under byggnadsobjektets användnings- och underhållsskede

- lang: en
  text: information model of a built asset that contains the information required during the use and maintenance phase of the built asset

notes:
- lang: fi
  text: 'Käsitejärjestelmäkaavio: https://sanastokeskus.fi/suomi.fi/rymallit/tietomalli.svg'

- lang: fi
  text: Omaisuuskohteen informaatiomallin sisältö perustuu usein projektin informaatiomalliin, johon kuuluvat esimerkiksi suunnitelma- ja toteumamallin tiedot.

- lang: fi
  text: Omaisuuskohteen informaatiomalli tukee omaisuudenhallintaa.

- lang: sv
  text: Innehållet i tillgångsinformationsmodellen baseras ofta på projektets informationsmodell, som till exempel omfattar uppgifter från planerings- och genomförandemodeller.

- lang: sv
  text: Tillgångsinformationsmodellen stödjer förvaltningen av tillgångar.

- lang: en
  text: The content of the asset information model is often based on the project information model, which includes for example information from design and as-built models.

- lang: en
  text: The asset information model supports asset management.

