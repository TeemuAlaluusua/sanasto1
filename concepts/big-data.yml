definitions:
- lang: fi
  text: |
    Laajoja ja monimuotoisia tietokokonaisuuksia, joiden käsittely,
    tallentaminen ja analysointi edellyttävät skaalautuvaa teknologiaa.
- lang: sv
  text: |
    Stora och mångsidiga datamängder vars lagring, bearbetning och
    analys kräver skalbar teknik.
- lang: en
  text: |
    Large and diverse datasets whose storage, processing and
    analysis require scalable technologies.

notes:
- lang: fi
  text: |
    Suurdataa kuvataan usein niin sanotulla 4V-mallilla:
    määrä (volume), monimuotoisuus (variety), nopeus (velocity)
    ja vaihtelevuus (variability). Data voi olla rakenteista,
    puolirakenteista tai rakenteetonta, kuten tekstiä, kuvia,
    videoita tai ääntä.
- lang: sv
  text: |
    Stordata beskrivs ofta genom den så kallade 4V-modellen:
    volym, variation, hastighet och variabilitet. Data kan vara
    strukturerad, semistrukturerad eller ostrukturerad.
- lang: en
  text: |
    Big data is often characterized by the 4V model:
    volume, variety, velocity and variability. Data may be
    structured, semi-structured or unstructured.

