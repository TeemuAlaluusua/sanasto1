id: juurisyy
status: []
schemeId: []
terms:
  - lang: fi
    label: juurisyy
    type: Suositettava termi
  - lang: sv
    label: grundorsak
    type: Suositettava termi
  - lang: en
    label: root cause
    type: Suositettava termi
definitions:
  - lang: fi
    text: Häiriön tai ongelman taustalla oleva alkuperäinen syy.
  - lang: sv
    text: Den ursprungliga orsaken bakom en störning eller ett problem.
  - lang: en
    text: The original cause underlying a disturbance or problem.
notes:
  - lang: fi
    text: |
      Juurisyy viittaa ongelman perimmäiseen syyhyn, jonka poistaminen estää ongelman toistumisen.
  - lang: sv
    text: |
      Grundorsak avser den bakomliggande orsaken till ett problem, vars eliminering förhindrar att problemet upprepas.
  - lang: en
    text: |
      Root cause refers to the underlying cause of a problem, the elimination of which prevents recurrence.
sources:
