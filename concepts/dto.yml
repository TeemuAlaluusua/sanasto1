definitions:
- lang: fi
  text: |
    Tuotantotapa, jossa tuotteen suunnittelu, tuotekehitys ja
    valmistus käynnistyvät asiakaskohtaisen tilauksen perusteella.

- lang: sv
  text: |
    Produktionssätt där produktens konstruktion, produktutveckling
    och tillverkning inleds utifrån en kundspecifik beställning.

- lang: en
  text: |
    Production strategy in which product design, development
    and manufacturing are initiated based on a specific
    customer order.

notes:
- lang: fi
  text: |
    DTO-tuotteet ovat asiakasräätälöityjä projektituotteita,
    jotka suunnitellaan ja valmistetaan tilauskohtaisesti.
    Toisin kuin ETO-tuotteissa, DTO-toimitus voi sisältää
    merkittävää tuotekehitystä, mikä yleensä pidentää
    toimitusaikoja.

- lang: sv
  text: |
    DTO-produkter är kundanpassade projektprodukter som
    konstrueras och tillverkas baserat på en specifik order.
    Till skillnad från ETO-produkter kan DTO-leveranser
    inkludera omfattande produktutveckling, vilket ofta
    leder till längre leveranstider.

- lang: en
  text: |
    DTO products are typically customized project products
    designed and manufactured for a specific order.
    Deliveries may include significant product development,
    which often results in longer lead times.

