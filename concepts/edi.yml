definitions:
- lang: fi
  text: standardoitu tekniikka, jota käytetään organisaatioiden välisten tietojärjestelmien kommunikointiin

- lang: sv
  text: standardiserad teknik som används för kommunikation mellan informationssystem i olika organisationer

- lang: en
  text: standardized technique used for communication between information systems of different organizations

notes:
- lang: fi
  text: |
    EDI yhdistetään yleensä EDIFACT-sanomaformaattiin. Suurin osa esimerkiksi
    kaupan, tukkukaupan, teollisuuden ja kuljetusalan sanomista on EDIFACT-standardin mukaisia sanomia.

- lang: sv
  text: |
    EDI kopplas vanligtvis till EDIFACT-meddelandeformatet. En stor del av
    meddelandena inom handel, grossisthandel, industri och transport följer EDIFACT-standarden.

- lang: en
  text: |
    EDI is commonly associated with the EDIFACT message format. A large share of
    messages in trade, wholesale, industry and transport sectors follow the EDIFACT standard.

