definitions:
  - lang: fi
    text: Määritelmä, jonka mukaan eri sovellukset voivat tehdä pyyntöjä ja vaihtaa tietoja keskenään.
  - lang: sv
    text: Definition som gör det möjligt för olika applikationer att göra förfrågningar och utbyta data med varandra.
  - lang: en
    text: Definition that allows different applications to make requests and exchange data with each other.
notes:
  - lang: fi
    text: |
      Rajapinta voi olla pelkkä datarajapinta, jonka kautta voidaan lukea palvelun sisältämää dataa toisiin järjestelmiin.
      Esimerkki ohjelmointirajapinnasta on käyttöjärjestelmän rajapinta, jolla ohjelmat voivat käyttää keskusmuistia ja tiedostoja.
  - lang: sv
    text: |
      Gränssnittet kan vara ett rent datagränssnitt genom vilket data från en tjänst kan läsas till andra system.
      Ett exempel är operativsystemets gränssnitt som gör det möjligt för program att använda minne och filer.
  - lang: en
    text: |
      The interface may be a data interface through which data from a service can be accessed by other systems.
      An example is an operating system interface that allows programs to use memory and files.
