  label: data management
  type: Suositettava termi

definitions:
- lang: fi
  text: Tiedonhallinta on kattotermi, joka sisältää datan hyödyntämiseen liittyvän kehityksen, hallinnan, operaatiot sekä käytännöt koko tiedon elinkaaren ajan. Alueelle kuuluvat mm. datastrategia, data governance, käsitteiden mallintaminen, tietovarastointi, turvallisuusasiat, tietoarkkitehtuuri, talletusratkaisut ja tietojen laatu.

- lang: sv
  text: Datahantering är ett paraplybegrepp som omfattar utveckling, styrning, operativa aktiviteter och praxis kopplade till användning av data under hela dess livscykel. Området omfattar bland annat datastrategi, data governance, begreppsmodellering, datalagring, säkerhetsaspekter, informationsarkitektur, lagringslösningar och datakvalitet.

- lang: en
  text: Data management is an umbrella term that includes development, governance, operations and practices related to the use of data throughout its lifecycle. The area includes, among others, data strategy, data governance, conceptual modeling, data storage, security aspects, information architecture, storage solutions and data quality.

