definitions:
- lang: fi
  text: tietojenkäsittelytieteen osa-alue, jossa järjestelmä oppii datasta ja parantaa suorituskykyään tehtävässä ilman eksplisiittistä ohjelmointia

- lang: sv
  text: delområde inom datavetenskap där ett system lär sig från data och förbättrar sin prestanda i en uppgift utan explicit programmering

- lang: en
  text: field of study in which a system learns from data and improves its performance on a task without being explicitly programmed

notes:
- lang: fi
  text: Koneoppiminen hyödyntää tilastollisia ja laskennallisia menetelmiä.

- lang: sv
  text: Maskininlärning använder statistiska och beräkningsmässiga metoder.

- lang: en
  text: Machine learning uses statistical and computational methods.

