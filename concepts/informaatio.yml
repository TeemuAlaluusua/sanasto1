definitions:
- lang: fi
  text: datan uudelleen tulkittavissa oleva sovitun muotoinen esitystapa, joka sopii tiedonsiirtoon, viestintään, tulkintaan tai käsittelyyn

- lang: sv
  text: överenskommen form av data som kan tolkas på nytt och som lämpar sig för överföring, kommunikation, tolkning eller behandling

- lang: en
  text: agreed form of data that can be reinterpreted and that is suitable for transmission, communication, interpretation or processing

notes:
- lang: fi
  text: Informaatiota voi käsitellä ihminen tai sitä voidaan käsitellä automaattisin menetelmin.

- lang: sv
  text: Information kan behandlas av människor eller automatiskt med tekniska metoder.

- lang: en
  text: Information may be processed by humans or automatically by technical means.

