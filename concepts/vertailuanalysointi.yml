definitions:
- lang: fi
  text: Vertailuanalysointi tarkoittaa oman toiminnan vertaamista toisten toimintaan, usein parhaaseen vastaavaan käytäntöön. Vertailuanalysoinnin perusidea on toisilta oppiminen ja oman toiminnan kyseenalaistaminen.

- lang: sv
  text: Benchmarking innebär att jämföra den egna verksamheten med andras verksamhet, ofta med bästa motsvarande praxis. Grundidén med benchmarking är att lära av andra och att ifrågasätta den egna verksamheten.

- lang: en
  text: Benchmarking refers to comparing one's own activities with those of others, often with the best corresponding practices. The basic idea of benchmarking is learning from others and questioning one's own operations.

