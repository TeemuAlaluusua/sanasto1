definitions:
- lang: fi
  text: Tietosisällöt, joilla on sama käyttötarkoitus, mutta eri voimassaoloaika ja joiden sisältö voi poiketa toisistaan. Versio on yksittäisen sanaston, koodiston tai tietomallin uusi tai vanha versio. Niiden voimassaolon alkamis- ja päättymispäivämäärät poikkeavat toisistaan. Tyypillisesti uusi versio korvaa vanhan version.

- lang: sv
  text: Informationsinnehåll med samma användningsändamål men med olika giltighetstid och vars innehåll kan skilja sig från varandra. En version är en ny eller gammal version av ett enskilt begreppssystem, kodsystem eller informationsmodell. Deras giltighetsperioder börjar och slutar vid olika tidpunkter. Vanligtvis ersätter en ny version den gamla versionen.

- lang: en
  text: Information contents that have the same purpose of use but different validity periods and whose content may differ from each other. A version is a new or old version of a specific terminology, code system or data model. Their validity start and end dates differ. Typically, a new version replaces the old version.

