definitions:
- lang: fi
  text: SFS-EN ISO 29481-1 -standardin mukainen menettely, jolla kuvataan informaatiotuotannon prosessit ja sisältövaatimukset tiettyyn käyttötarkoitukseen tuotettavalle informaatiolle

- lang: sv
  text: metod enligt SFS-EN ISO 29481-1 för att beskriva processer för informationsproduktion och innehållskrav för information som tas fram för ett visst användningsändamål

- lang: en
  text: method according to SFS-EN ISO 29481-1 for describing information production processes and content requirements for information produced for a specific purpose

notes:
- lang: fi
  text: |
    IDM-määrittely jakautuu kolmeen osioon: käyttötapaus, prosessit ja
    tiedonvaihdon vaatimukset (Use Case, Process Definition, Exchange Requirement).

- lang: sv
  text: |
    IDM-definitionen delas in i tre delar: användningsfall, processer och
    krav på informationsutbyte (Use Case, Process Definition, Exchange Requirement).

- lang: en
  text: |
    IDM is divided into three parts: use case, process definition and
    exchange requirements.

