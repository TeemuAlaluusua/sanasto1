definitions:
- lang: fi
  text: tietomalli, joka on tarkoitettu kaavan tietojen kuvaamiseen

- lang: sv
  text: datamodell som är avsedd för att beskriva information i en plan

- lang: en
  text: data model intended for describing the information of a land use plan

notes:
- lang: fi
  text: |
    Valtakunnallinen kaavatietomalli koostuu kaavaa,
    kaavakohteita ja kaavamääräyksiä kuvaavista osista.

- lang: sv
  text: |
    Den nationella plandatamodellen består av delar
    som beskriver planen, planobjekt och planbestämmelser.

- lang: en
  text: |
    The national data model for land use plans consists
    of parts describing the plan, plan objects and
    planning regulations.

