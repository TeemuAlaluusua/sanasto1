- lang: sv
  label: digital transformation
  type: Suositettava termi

- lang: en
  label: digital transformation
  type: Suositettava termi

definitions:
- lang: fi
  text: toimintakulttuurin systeeminen muutos, jossa digitaalisia teknologioita hyödynnetään toiminnan tehostamiseksi ja kehittämiseksi

- lang: sv
  text: systemisk förändring av verksamhetskultur där digital teknik används för att effektivisera och utveckla verksamheten

- lang: en
  text: systemic change of operational culture in which digital technologies are used to improve and transform activities

notes:
- lang: fi
  text: Digitalisaatio perustuu usein datan hyödyntämiseen ja analysointiin.

- lang: sv
  text: Digital transformation baseras ofta på användning och analys av data.

- lang: en
  text: Digital transformation is often based on the use and analysis of data.

