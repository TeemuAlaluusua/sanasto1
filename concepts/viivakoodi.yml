  - lang: en
    label: bar code
    type: Suositettava termi

definitions:
  - lang: fi
    text: "digitaalinen koodausjärjestelmä, joka muodostuu silmin havaittavasta kuviosta, jossa on pystysuoria (mahdollisesti) erilevyisiä, erikorkuisia ja eritasoisia viivoja erotettuna (mahdollisesti) erilevyisillä väleillä, ja jossa tätä merkkien ja välien sijoittelua käytetään koodaamaan tietoa erityyppisten aineellisten objektien tunnistamiseksi"
  - lang: en
    text: "digital coding system showing an eye-visible linear array of rectangular marks of (possibly) varying width, height and vertical alignment, separated by spaces of (possibly) varying width in which the positioning and size of marks and spaces are used to code information to identify various types of material objects"

