definitions:
  - lang: fi
    text: Yksi kokonaisuuden osa.
  - lang: sv
    text: En del av en helhet.
  - lang: en
    text: One of the parts of a system, process, or machine.
notes:
  - lang: fi
    text: |
      Rakennuskohteen komponentit ovat joko rakennusosia tai tuoteosia.
      Rakennusosat valmistetaan pääosin työmaalla, kun taas tuoteosat ovat valmiita ostettavia tuotteita, jotka asennetaan.
  - lang: sv
    text: |
      Komponenter i en byggnad utgörs av byggdelar eller produktdelar.
      Byggdelar tillverkas huvudsakligen på plats, medan produktdelar är färdiga produkter som installeras.
  - lang: en
    text: |
      In construction, components can be building elements or product elements.
      Building elements are mainly assembled on site, while product elements are pre-manufactured items that are installed.
