- lang: sv
  label: informationskrav
  type: Suositettava termi

- lang: en
  label: information requirement
  type: Suositettava termi

definitions:
- lang: fi
  text: vaatimus siitä, mitä tietoa tarvitaan, milloin ja missä muodossa se tuotetaan sekä kenelle se toimitetaan

- lang: sv
  text: krav som anger vilken information som behövs, när och i vilken form den ska produceras samt till vem den ska levereras

- lang: en
  text: requirement specifying what information is needed, when it is to be produced, in what form and to whom it is to be delivered

